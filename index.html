    <link rel="stylesheet" href="styles.css">
    <title>Ministry Form</title>
    <style>
        :root {
            --background-light: #ffffff;
            --background-dark: #222222;
            --text-light: #000000;
            --text-dark: #ffffff;
            --gradient: linear-gradient(to right, #6a11cb, #2575fc);
        }
        body {
            background-color: var(--background-light);
            color: var(--text-light);
            transition: background-color 0.5s, color 0.5s;
        }
        body.dark-mode {
            background-color: var(--background-dark);
            color: var(--text-dark);
        }
        /* Additional CSS for better UI */
        .table {
            width: 100%;
            max-height: 500px;
            overflow-y: auto;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
        /* Animations */
        .fade-in {
            animation: fadeIn 0.5s;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        /* Status bar styles */
        .status-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--gradient);
            color: #fff;
            padding: 10px;
            text-align: center;
        }
    </style>
</head>
